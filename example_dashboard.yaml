# Satoshi Sensor — Beispiel-Dashboard
#
# Dieses Dashboard in Home Assistant einfügen:
#   Einstellungen → Dashboards → Dashboard hinzufügen (oder bestehendes bearbeiten)
#   → Drei-Punkte-Menü → YAML-Roheditor → Inhalt ersetzen
#
# ENTITY-IDs ANPASSEN:
#   Die Entity-IDs hängen von deinen Labels ab.
#   Eigene IDs findest du unter: Entwicklerwerkzeuge → Zustände → nach "satoshi" filtern
#
# Platzhalter in diesem Beispiel:
#   LABEL_1  → dein erstes Wallet-Label (z. B. "Cold Wallet")
#   LABEL_2  → dein zweites Wallet-Label (z. B. "Hot Wallet")
#   Einzel-Adressen-Sensoren enden auf …_native_segwit_… (bzw. …_legacy_… / …_taproot_…)
#   Portfolio-Total-Sensoren beginnen mit sensor.satoshi_sensor_total_…

title: Bitcoin Portfolio
views:
  - title: Übersicht
    icon: mdi:bitcoin
    cards:

      # ── Portfolio-Gesamt ────────────────────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Bitcoin Portfolio"

          - type: glance
            title: Gesamt
            show_name: true
            show_icon: true
            show_state: true
            entities:
              - entity: sensor.satoshi_sensor_total_total_balance_satoshi
                name: Satoshi
              - entity: sensor.satoshi_sensor_total_total_balance_btc
                name: BTC
              - entity: sensor.satoshi_sensor_total_total_value
                name: Wert

      # ── BTC Preis & 24h-Änderung ────────────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## BTC Preis"

          - type: glance
            show_name: true
            entities:
              - entity: sensor.btc_wallet_label_1_legacy_btc_price_change_24h
                name: Änderung 24h

          - type: gauge
            entity: sensor.btc_wallet_label_1_legacy_btc_price_change_24h
            name: BTC Preisänderung 24h
            min: -20
            max: 20
            needle: true
            severity:
              green: 0
              yellow: -5
              red: -20

      # ── Wallet 1 ────────────────────────────────────────────────────────────
      - type: entities
        title: "Wallet: LABEL_1"
        icon: mdi:bitcoin
        entities:
          - entity: sensor.btc_wallet_label_1_legacy_balance_satoshi
            name: Balance (Satoshi)
          - entity: sensor.btc_wallet_label_1_legacy_balance_btc
            name: Balance (BTC)
          - entity: sensor.btc_wallet_label_1_legacy_value
            name: Wert
          - entity: sensor.btc_wallet_label_1_legacy_unconfirmed_balance
            name: Unbestätigt
          - entity: sensor.btc_wallet_label_1_legacy_transactions
            name: Transaktionen
          - entity: sensor.btc_wallet_label_1_legacy_address
            name: Adresse
            icon: mdi:identifier

      # ── Wallet 2 ────────────────────────────────────────────────────────────
      - type: entities
        title: "Wallet: LABEL_2"
        icon: mdi:bitcoin
        entities:
          - entity: sensor.btc_wallet_label_2_native_segwit_balance_satoshi
            name: Balance (Satoshi)
          - entity: sensor.btc_wallet_label_2_native_segwit_balance_btc
            name: Balance (BTC)
          - entity: sensor.btc_wallet_label_2_native_segwit_value
            name: Wert
          - entity: sensor.btc_wallet_label_2_native_segwit_unconfirmed_balance
            name: Unbestätigt
          - entity: sensor.btc_wallet_label_2_native_segwit_transactions
            name: Transaktionen
          - entity: sensor.btc_wallet_label_2_native_segwit_address
            name: Adresse
            icon: mdi:identifier

      # ── HD Wallet (xpub/ypub/zpub) ──────────────────────────────────────────
      # Für xpub-Einträge: statt "address" gibt es "active_addresses"
      # Beispiel für einen zpub-Eintrag mit Label "Hardware Wallet":
      #
      # - type: entities
      #   title: "HD Wallet: Hardware Wallet"
      #   icon: mdi:wallet
      #   entities:
      #     - entity: sensor.btc_wallet_hardware_wallet_native_segwit_balance_satoshi
      #       name: Balance (Satoshi)
      #     - entity: sensor.btc_wallet_hardware_wallet_native_segwit_balance_btc
      #       name: Balance (BTC)
      #     - entity: sensor.btc_wallet_hardware_wallet_native_segwit_value
      #       name: Wert
      #     - entity: sensor.btc_wallet_hardware_wallet_native_segwit_unconfirmed_balance
      #       name: Unbestätigt
      #     - entity: sensor.btc_wallet_hardware_wallet_native_segwit_transactions
      #       name: Transaktionen
      #     - entity: sensor.btc_wallet_hardware_wallet_native_segwit_active_addresses
      #       name: Aktive Adressen
